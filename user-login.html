<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录 - 番茄旅行AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#FF6B35;--a:#00C9A7;--bg:#F8F9FA;--t:#1A1A2E;--g:#6B7280;--b:rgba(26,58,74,0.1)}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#FFF9F5 0%,#F8F9FA 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.1);max-width:400px;width:100%;padding:32px}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.logo-text{font-size:24px;font-weight:700;color:var(--p)}
.subtitle{text-align:center;color:var(--g);margin-bottom:24px;font-size:14px}
.tabs{display:flex;margin-bottom:24px;border-radius:8px;background:var(--bg);padding:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--g);transition:all 0.2s}
.tab.active{background:#fff;color:var(--p);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;color:var(--t);margin-bottom:6px}
input{width:100%;padding:12px 16px;border:1px solid var(--b);border-radius:8px;font-size:14px;transition:all 0.2s}
input:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:var(--p);color:#fff;transition:all 0.2s}
.btn:hover{background:#E55A2B;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-secondary{background:var(--bg);color:var(--t);margin-top:12px}
.btn-secondary:hover{background:#E5E7EB}
.demo-account{margin-top:16px;padding:12px;background:#FFF9F5;border-radius:8px;font-size:13px;color:var(--g);text-align:center}
.demo-account strong{color:var(--p)}
.footer{text-align:center;margin-top:24px;font-size:12px;color:var(--g)}
.footer a{color:var(--p);text-decoration:none}
.error{color:#EF4444;font-size:12px;margin-top:4px}
.success{color:var(--a);font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<div class="logo-icon">🍅</div>
<span class="logo-text">番茄旅行AI</span>
</div>
<p class="subtitle">智能旅游助手，让旅行更简单</p>

<div class="tabs">
<button class="tab active" onclick="switchTab('login')">登录</button>
<button class="tab" onclick="switchTab('register')">注册</button>
</div>

<div id="loginForm">
<div class="form-group">
<label>用户名</label>
<input type="text" id="loginUsername" placeholder="请输入用户名">
</div>
<div class="form-group">
<label>密码</label>
<input type="password" id="loginPassword" placeholder="请输入密码">
</div>
<button class="btn" onclick="handleLogin()">登录</button>
<div class="demo-account">
演示账号：<strong>yanshi01</strong> / 密码：<strong>123456</strong>
</div>
<button class="btn btn-secondary" onclick="fillDemo()">使用演示账号</button>
</div>

<div id="registerForm" style="display:none">
<div class="form-group">
<label>用户名</label>
<input type="text" id="regUsername" placeholder="请输入用户名">
</div>
<div class="form-group">
<label>密码</label>
<input type="password" id="regPassword" placeholder="请输入密码">
</div>
<div class="form-group">
<label>确认密码</label>
<input type="password" id="regConfirm" placeholder="请再次输入密码">
</div>
<button class="btn" onclick="handleRegister()">注册</button>
</div>

<div class="footer">
<p>供应商入驻？<a href="supplier-login.html">点击这里</a></p>
</div>
</div>

<script>
function switchTab(tab){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
event.target.classList.add('active');
document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
}

function fillDemo(){
document.getElementById('loginUsername').value='yanshi01';
document.getElementById('loginPassword').value='123456';
}

function handleLogin(){
var username=document.getElementById('loginUsername').value.trim();
var password=document.getElementById('loginPassword').value.trim();

if(!username||!password){
alert('请输入用户名和密码');
return;
}

var users=JSON.parse(localStorage.getItem('users')||'[]');
var user=users.find(function(u){return u.username===username&&u.password===password});

if(user){
localStorage.setItem('current_user',JSON.stringify(user));
alert('登录成功！');
window.location.href='index.html';
}else{
alert('用户名或密码错误');
}
}

function handleRegister(){
var username=document.getElementById('regUsername').value.trim();
var password=document.getElementById('regPassword').value.trim();
var confirm=document.getElementById('regConfirm').value.trim();

if(!username||!password){
alert('请填写完整信息');
return;
}

if(password!==confirm){
alert('两次密码不一致');
return;
}

if(password.length<6){
alert('密码至少6位');
return;
}

var users=JSON.parse(localStorage.getItem('users')||'[]');
if(users.some(function(u){return u.username===username})){
alert('用户名已存在');
return;
}

var newUser={
user_id:'u_'+Date.now(),
username:username,
password:password,
created_at:Date.now()
};

users.push(newUser);
localStorage.setItem('users',JSON.stringify(users));
alert('注册成功！请登录');
switchTab('login');
document.querySelector('.tab').click();
document.getElementById('loginUsername').value=username;
}
</script>
</body>
</html>
